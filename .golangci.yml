version: "2"
run:
  timeout: 5m
linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gocritic
    - revive
    - errname
    - exhaustive
    - sqlclosecheck
  settings:
    revive:
      rules:
        - name: unexported-return
          disabled: true
    gocritic:
      enabled-tags: [diagnostic, style, performance]
  exclusions:
    paths:
      - web/node_modules
    rules:
      - path: _test\.go
        linters: [errcheck]
formatters:
  enable:
    - gofmt
    - goimports

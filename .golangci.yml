run:
  timeout: 5m
linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - misspell
    - gofmt
    - goimports
    - gocritic
    - revive
    - errname
    - exhaustive
    - sqlclosecheck
linters-settings:
  revive:
    rules:
      - name: unexported-return
        disabled: true
  gocritic:
    enabled-tags: [diagnostic, style, performance]
issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck]

pre-commit:
  parallel: true
  commands:
    go-format:
      glob: "*.go"
      run: goimports -w {staged_files} && git add {staged_files}
    go-lint:
      glob: "*.go"
      run: golangci-lint run --fix ./cmd/... ./internal/...
    go-vet:
      glob: "*.go"
      run: go vet ./cmd/... ./internal/...
    go-test:
      glob: "*.go"
      run: go test ./cmd/... ./internal/... -short
    gen-docs:
      glob: "cmd/miser/*.go"
      run: go run ./cmd/miser gen-docs docs/commands/ && git add docs/commands/
